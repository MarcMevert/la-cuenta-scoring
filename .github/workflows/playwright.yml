name: Playwright-Test
on:
  workflow_run:
    workflows: ["CodeQL Advanced"]
    types: [completed]
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.58.2-jammy 
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Run Playwright tests
      run: npm run test:e2e
    - name: Build Pages artifact
      run: |
        mkdir -p dist
        cp index.html app.js style.css manifest.json sw.js dist/
        if [ -d "icons" ]; then cp -r icons dist/icons; fi
        if [ -d "docs" ]; then cp -r docs dist/docs; fi
    - name: Upload site artifact
      uses: actions/upload-artifact@v4
      with:
        name: site-dist
        path: dist/
        retention-days: 7
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

