name: Deploy GitHub Pages
on:
  workflow_run:
    workflows:
    - CI Checks
    types:
    - completed

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Deploy to GitHub Pages
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master') }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.workflow_run.head_sha }}
    - uses: actions/configure-pages@v5
    - name: Build Pages artifact
      run: |
        mkdir -p dist
        cp index.html app.js style.css manifest.json sw.js dist/
        if [ -d "icons" ]; then cp -r icons dist/icons; fi
        if [ -d "docs" ]; then cp -r docs dist/docs; fi
    - uses: actions/upload-pages-artifact@v3
      with:
        path: dist
    - id: deployment
      uses: actions/deploy-pages@v4
